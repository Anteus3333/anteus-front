<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Hors ligne · Anteus Todos</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: #f9fafb;
        color: #111827;
      }
      .card {
        max-width: 28rem;
        padding: 2rem;
        text-align: center;
      }
      h1 { margin: 0 0 0.5rem; font-size: 1.5rem; }
      p { margin: 0 0 1.25rem; color: #4b5563; line-height: 1.5; }
      button {
        appearance: none;
        border: 0;
        background: #111827;
        color: #f9fafb;
        padding: 0.6rem 1.1rem;
        border-radius: 9999px;
        font-weight: 500;
        cursor: pointer;
      }
      button:hover { background: #1f2937; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Hors ligne</h1>
      <p>Pas de connexion pour le moment. Les modifications que tu fais sont conservées localement et seront synchronisées automatiquement au retour en ligne.</p>
      <button onclick="location.reload()">Réessayer</button>
    </div>
  </body>
</html>
